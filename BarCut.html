<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAPAT CONSTRUCTION | Bar-Cut List Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }

        /* Rebar Texture */
        .rebar-texture {
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.2),
                rgba(255, 255, 255, 0.2) 5px,
                transparent 5px,
                transparent 10px
            );
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Minimal stacked logo */
        .logo-mark {
            line-height: 1;
        }
        .logo-mark .logo-top {
            font-family: 'Sarabun', sans-serif;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: 0.12em;
            color: #ef4444;
        }
        .logo-mark .logo-bottom {
            font-family: 'Sarabun', sans-serif;
            font-weight: 500;
            font-size: 8px;
            letter-spacing: 0.32em;
            color: #94a3b8;
            margin-top: 2px;
        }

        /* Tab buttons */
        .mode-tab {
            transition: all 0.15s ease;
        }
        .mode-tab.active {
            background-color: #24306e;
            color: white;
        }
        .mode-tab:not(.active) {
            background-color: #f1f5f9;
            color: #64748b;
        }

        /* Print Settings */
        @media print {
            .no-print { display: none !important; }
            body { background: white; padding: 0; margin: 0; font-size: 10px; line-height: 1.3; }
            .page-break { page-break-before: always; }
            .print-container { margin: 0; width: 100%; max-width: none; box-shadow: none; border: none; padding: 6px !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .bottom-margin { margin-bottom: 0.3cm; }

            /* Print-specific styles */
            h1, h2, h3 { margin: 2px 0 1px 0; padding: 0; line-height: 1.2; }
            h1 { font-size: 16px; }
            h2 { font-size: 13px; }
            h3 { font-size: 11px; }
            table { margin: 2px 0; font-size: 9px; border-collapse: collapse; }
            th, td { padding: 2px 3px !important; }
            thead { font-size: 9px; }
            p { margin: 0; padding: 0; line-height: 1.3; }
            .bg-white { padding: 3px !important; margin: 2px 0 !important; }
            .rounded-xl { border-radius: 1px; }
            .shadow { box-shadow: none; }
            tr { page-break-inside: avoid; }
        }

        input:focus, select:focus {
            outline: 2px solid #24306e;
            outline-offset: 1px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-white shadow-md border-b-4 border-[#24306e] sticky top-0 z-50 no-print">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="logo-mark flex flex-col items-center justify-center pr-4 border-r border-slate-200">
                    <span class="logo-top">NAPAT</span>
                    <span class="logo-bottom">CONSTRUCTION</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 leading-tight">Bar-Cut List <span class="text-xs bg-[#24306e] text-white px-1 rounded ml-1 align-top">PRO</span></h1>
                    <p class="text-xs text-slate-500">NAPAT CONSTRUCTION | Rebar Optimization Tool</p>
                </div>
            </div>
            <div>
                <button onclick="window.print()" class="bg-[#24306e] text-white px-4 py-2 rounded shadow hover:bg-slate-800 transition flex items-center gap-2">
                    <i class="fa-solid fa-print"></i> <span class="hidden sm:inline">พิมพ์รายงาน</span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-7xl mx-auto w-full p-4 sm:p-6 space-y-6 print-container">

        <!-- MODE TABS -->
        <div class="flex gap-2 no-print">
            <button id="tab-order" onclick="switchMode('order')" class="mode-tab active flex-1 py-3 rounded-xl font-bold shadow-sm border border-slate-200">
                <i class="fa-solid fa-scissors"></i> โหมดคำนวณตัดเหล็ก
            </button>
            <button id="tab-stock" onclick="switchMode('stock')" class="mode-tab flex-1 py-3 rounded-xl font-bold shadow-sm border border-slate-200">
                <i class="fa-solid fa-warehouse"></i> โหมดเช็คสต็อกเหล็ก
            </button>
        </div>

        <!-- ORDER / CUT PANEL -->
        <div id="panel-order" class="bg-white rounded-xl shadow p-6 border border-slate-200 no-print">
            <div class="flex items-center gap-2 mb-6 border-b pb-2">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-[#24306e]"><i class="fa-solid fa-plus"></i></div>
                <h2 class="text-lg font-bold text-slate-700">เพิ่มรายการตัดเหล็ก</h2>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-12 gap-4 mb-6">
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">ประเภท</label>
                    <select id="steel-type" onchange="updateDiameters()" class="w-full border border-slate-300 rounded p-2 bg-slate-50">
                        <option value="RB">RB (เหล็กเส้นกลม)</option>
                        <option value="DB">DB (เหล็กข้ออ้อย)</option>
                    </select>
                </div>

                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">
                        ขนาด
                        <button type="button" onclick="openWeightModal()" class="font-bold text-blue-600 hover:text-blue-800 ml-1 cursor-pointer bg-blue-50 px-2 rounded-full text-[10px] border border-blue-200">
                            <i class="fa-solid fa-gear"></i> ตั้งค่าน้ำหนัก
                        </button>
                    </label>
                    <select id="diameter" onchange="checkCustomDiameter()" class="w-full border border-slate-300 rounded p-2 bg-slate-50">
                        <option value="" selected disabled>เลือกขนาด</option>
                    </select>
                </div>

                <div class="col-span-1 md:col-span-2" id="custom-dia-container" style="display:none;">
                    <label class="block text-xs font-bold text-orange-600 mb-1">ขนาด (mm)</label>
                    <input type="text" id="custom-dia" placeholder="เช่น 40" class="w-full border-2 border-orange-200 rounded p-2 bg-orange-50 font-bold">
                </div>

                <div class="col-span-1 md:col-span-2" id="custom-weight-container" style="display:none;">
                    <label class="block text-xs font-bold text-orange-600 mb-1">น้ำหนัก (kg/m)</label>
                    <input type="number" step="0.001" id="custom-weight" placeholder="0.000" class="w-full border-2 border-orange-200 rounded p-2 bg-orange-50 font-bold">
                </div>

                <div class="col-span-1 md:col-span-2" id="cut-length-container">
                    <label class="block text-xs font-bold text-slate-500 mb-1">ความยาวเต็ม (ม.)</label>
                    <input type="number" id="cut-length" value="10" class="w-full border border-slate-300 rounded p-2">
                </div>
                <div class="col-span-1 md:col-span-2 hidden" id="cut-length-stock-note">
                    <label class="block text-xs font-bold text-emerald-600 mb-1">ความยาวเต็ม (ม.)</label>
                    <div class="w-full border-2 border-dashed border-emerald-300 rounded p-2 bg-emerald-50 text-emerald-700 text-xs font-bold flex items-center h-[42px]">
                        <i class="fa-solid fa-wand-magic-sparkles mr-1"></i> Optimize จากสต็อกอัตโนมัติ
                    </div>
                </div>
                <div class="col-span-1 md:col-span-2 flex flex-col justify-end">
                    <label class="flex items-center gap-2 cursor-pointer select-none bg-emerald-50 border border-emerald-200 rounded p-2 h-[42px]">
                        <input type="checkbox" id="use-stock" onchange="toggleUseStock()" class="w-4 h-4 accent-emerald-600 flex-shrink-0">
                        <span class="text-[11px] font-bold text-emerald-800 leading-tight">ใช้เหล็กในคลัง<br>(Optimize อัตโนมัติ)</span>
                    </label>
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs font-bold text-blue-600 mb-1">ที่ต้องการ (ม.)</label>
                    <input type="number" id="required-length" placeholder="0.00" class="w-full border-2 border-blue-200 rounded p-2 bg-blue-50 font-bold text-slate-800">
                </div>
                <div class="col-span-1 md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">จำนวน</label>
                    <input type="number" id="quantity" value="1" min="1" class="w-full border border-slate-300 rounded p-2 text-center">
                </div>
                <div class="col-span-2 md:col-span-2">
                    <label class="block text-xs font-bold text-slate-500 mb-1">Note / ตำแหน่ง</label>
                    <input type="text" id="notes" placeholder="เช่น เสา C1" class="w-full border border-slate-300 rounded
